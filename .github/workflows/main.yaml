name: Github Action deployment for Gatus

on:
  push:
    branches:
      - main
permissions:
  id-token: write
jobs:
  deploy-leantime:
    name: Deploy Leantime App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Echo command
        run: echo "Hello World"
  deploy-gatus:
    name: Deploy Gatus App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Overwrite config.yaml
        run: |
          sed -i "s|token: .*|token: ${{ secrets.TOKEN }}|" config.yaml
          cat config.yaml
      - name: Login to AWS
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: us-east-1
      - name: Login to ECR manual
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 284845684968.dkr.ecr.us-east-1.amazonaws.com
      - name: Build and push Docker image
        run: |
          docker build -t gatus .
          docker tag gatus:latest 284845684968.dkr.ecr.us-east-1.amazonaws.com/lks-gatus:latest
          docker tag gatus:latest 284845684968.dkr.ecr.us-east-1.amazonaws.com/lks-gatus:${{ github.sha }}
          docker push 284845684968.dkr.ecr.us-east-1.amazonaws.com/lks-gatus:latest
          docker push 284845684968.dkr.ecr.us-east-1.amazonaws.com/lks-gatus:${{ github.sha }}
      - name: Download Task Definition
        run: |
          aws ecs describe-task-definition --task-definition lks-gatus-td --query 'taskDefinition' --output json > task-definition.json
          cat task-definition.json
      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-definition.json
          service: lks-gatus-service
          cluster: example-oss-cluster
          wait-for-service-stability: true
