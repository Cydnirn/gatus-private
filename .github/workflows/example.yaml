name: Github example deployment

on:
  push:
    branches:
      - main

jobs:
  deploy-leantime:
    name: Deploy Leantime App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Echo Hello World
        run: echo "Hello World"
  deploy-gatus:
    name: Deploy Gatus App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Configure Config.yaml
        run: |
          sed -i "s|token: .*|token: ${{ secrets.TOKEN }}|" config.yaml
          cat config.yaml
      - name: Login to AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 284845684968.dkr.ecr.us-east-1.amazonaws.com
      - name: Build and push Docker image
        run: |
          docker build -t gatus .
          docker tag gatus:latest 284845684968.dkr.ecr.us-east-1.amazonaws.com/example/gatus:latest
          docker tag gatus:latest 284845684968.dkr.ecr.us-east-1.amazonaws.com/example/gatus:${{ github.sha }}
          docker push 284845684968.dkr.ecr.us-east-1.amazonaws.com/example/gatus:latest
          docker push 284845684968.dkr.ecr.us-east-1.amazonaws.com/example/gatus:${{ github.sha }}
